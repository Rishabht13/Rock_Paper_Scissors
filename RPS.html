<!DOCTYPE html>
<html>
    <head>
        <title>
            Rock Paper Scissors
        </title>

    </head>
    <body>
        <h1>Click on your choice</h1>
        <button onclick="
        compare('Rock');
        ">Rock</button>
        <button onclick="compare('Paper')">Paper</button>
        <button onclick="compare('Scissors')">Scissors</button>
        <button onclick="
        Score.Loses = 0;
        Score.Wins = 0;
        Score.Ties = 0;
        alert('Score was Reset');
        ">Reset Score</button>
        <script>
            const Score = {
                Wins : 0,
                Loses : 0,
                Ties : 0
            }
            function pickMove(){
                let computerMove = '';
                const random = Math.random(); 
                if(random < 1/3){
                    computerMove = 'Rock';
                }
                else if(random >= 1/3 && random < 2/3){
                    computerMove = 'Paper';
                }
                else{
                    computerMove = 'Scissors';
                } 
                return computerMove;     
            }
            
            function compare(myMove){
                const computerMove = pickMove();
                let result = '';
                if(myMove === 'Rock'){
                    if(computerMove === 'Rock'){
                       result = 'Its a Tie!';
                    }
                    else if(computerMove === 'Paper'){
                        result = 'You Lose!';
                    }
                    else{
                        result = 'You Win!';
                    }
                }
            else if(myMove === 'Paper'){
                if(computerMove === 'Rock'){
                    result = 'You Win!';
                }
                else if(computerMove === 'Paper'){
                    result = 'Its a Tie!';
                }
                else{
                    result = 'You Lose!';
                }
                
            }
            else{
                 if(computerMove === 'Rock'){
                    result = 'You Lose!';
                }
                else if(computerMove === 'Paper'){
                    result = 'You Win!';
                }
                else{
                    result = 'Its a Tie!';
                }
            }
            if(result === 'You Win!'){
                Score.Wins += 1;
            }
            else if(result === 'You Lose!'){
                Score.Loses += 1;
            }
            else{
                Score.Ties += 1;
            }
            console.log(result);
            
            alert(`You choose ${myMove}. Computer choose ${computerMove}.${result}
Wins : ${Score.Wins}, Loses : ${Score.Loses}, Ties : ${Score.Ties}`);}
        </script>
    </body>
</html>
