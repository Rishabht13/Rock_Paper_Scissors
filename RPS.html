<!doctype html>
<html>
  <head>
    <title>Rock Paper Scissors</title>
  </head>
  <body>
    <h1>Click on your choice</h1>
    <button onclick="compare('Rock')">Rock</button>
    <button onclick="compare('Paper')">Paper</button>
    <button onclick="compare('Scissors')">Scissors</button>
    <p class="result"></p>
    <p class="move"></p>
    <p class="counter"></p>
    <button
      onclick="
        Score.Loses = 0;
        Score.Wins = 0;
        Score.Ties = 0;
        alert('Score was Reset');
        /* when we remove it from local storage it leaves null value
        if we reset score and refresh site it will just pick up the last data*/
        localStorage.removeItem('Score');
        document.querySelector('.move').innerHTML = '';
        document.querySelector('.result').innerHTML = '';
        updateScore();
      "
    >
      Reset Score
    </button>
    <script>
      // we used default operator for the null case
      let Score = JSON.parse(localStorage.getItem("Score")) || {
        Wins: 0,
        Loses: 0,
        Ties: 0,
      };

      updateScore();
      function pickMove() {
        let computerMove = "";
        const random = Math.random();
        if (random < 1 / 3) {
          computerMove = "Rock";
        } else if (random >= 1 / 3 && random < 2 / 3) {
          computerMove = "Paper";
        } else {
          computerMove = "Scissors";
        }
        return computerMove;
      }

      function compare(myMove) {
        const computerMove = pickMove();
        let result = "";
        if (myMove === "Rock") {
          if (computerMove === "Rock") {
            result = "Its a Tie!";
          } else if (computerMove === "Paper") {
            result = "You Lose!";
          } else {
            result = "You Win!";
          }
        } else if (myMove === "Paper") {
          if (computerMove === "Rock") {
            result = "You Win!";
          } else if (computerMove === "Paper") {
            result = "Its a Tie!";
          } else {
            result = "You Lose!";
          }
        } else {
          if (computerMove === "Rock") {
            result = "You Lose!";
          } else if (computerMove === "Paper") {
            result = "You Win!";
          } else {
            result = "Its a Tie!";
          }
        }
        if (result === "You Win!") {
          Score.Wins += 1;
        } else if (result === "You Lose!") {
          Score.Loses += 1;
        } else {
          Score.Ties += 1;
        }
        console.log(result);
        /*First we comvert the object score in json string to save in local storage.To put the value of score again above, we convert it back to object.*/
        localStorage.setItem("Score", JSON.stringify(Score));
        showMove(myMove, computerMove);
        updateResult(result);
        updateScore();
      }
      function updateScore() {
        document.querySelector(".counter").innerHTML =
          `Wins : ${Score.Wins}, Loses : ${Score.Loses}, Ties : ${Score.Ties}`;
      }
      function showMove(myMove, computerMove) {
        document.querySelector(".move").innerHTML =
          `Your move : ${myMove},,, Computer's Move : ${computerMove}`;
      }
      function updateResult(result) {
        document.querySelector(".result").innerHTML = `${result}`;
      }
    </script>
  </body>
</html>
