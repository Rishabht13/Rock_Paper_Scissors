<!doctype html>
<html>
  <head>
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href = "RPS.css">
  </head>
  <body>
    <h1>Click on your choice</h1>
    <button  class ="move-button Rock"><img src="rock-emoji.png" alt=""></button>
    <button  class ="move-button Paper"><img src="paper-emoji.png" alt=""></button>
    <button class ="move-button Scissors"><img src="scissors-emoji.png" alt=""></button>
    <p class="result"></p>
    <p class="move"></p>
    <p class="counter"></p>
    <button class="reset">
      Reset Score
    </button>
    <button class="auto" >Auto Play</button>
    <script src="RPS.js">
    </script>
  </body>
</html>
